<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #eef2f7; display: flex; justify-content: center; padding: 20px; }
    .card { background: white; width: 100%; max-width: 550px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; text-align: center; font-size: 24px; margin-bottom: 25px; }
    .step { display: none; }
    .active { display: block; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .instruction { background: #f8f9fa; border-left: 5px solid #3498db; padding: 12px; margin: 15px 0; font-size: 14px; color: #555; }
    .text-content { background:#fff; border: 1px solid #eee; padding:20px; border-radius:8px; line-height: 1.8; font-size: 18px; margin-bottom: 10px; color: #2c3e50; }
    .hint-highlight { color: inherit; font-weight: inherit; transition: 0.3s; }
    .hint-active { color: #e74c3c !important; font-weight: bold !important; text-decoration: underline; }
    
    input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .hint-btn { background: #95a5a6; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 13px; margin-bottom: 15px; }
    .option-btn { display: block; width: 100%; padding: 15px; margin: 12px 0; background: #fff; border: 2px solid #3498db; border-radius: 10px; cursor: pointer; text-align: left; font-size: 15px; transition: 0.2s; }
    .option-btn:hover { background: #3498db; color: white; }
    .next-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    #report-box { white-space: pre-wrap; background: #2c3e50; color: #ecf0f1; padding: 25px; border-radius: 12px; font-family: monospace; line-height: 1.7; font-size: 14px; margin-top: 15px; }
    .loading { text-align: center; color: #7f8c8d; padding: 30px; }
  </style>
</head>
<body>

<div class="card">
  <h1 id="game-title">🛡️ 文字修復大作戰</h1>

  <div id="step0" class="step active">
    <p>工程師你好，請輸入你的名字以連結系統：</p>
    <input type="text" id="userName" placeholder="輸入名字...">
    <button class="next-btn" onclick="initGame()">啟動修復系統</button>
  </div>

  <div id="step1" class="step">
    <h3>第一關：字魔捉迷藏</h3>
    <div class="instruction">任務：找出這段話中的 2 個「受感染的字」。</div>
    <div class="text-content" id="s1-display"></div>
    <button class="hint-btn" onclick="toggleHint()">🔍 獲取偵探提示</button>
    <input type="text" id="s1_ans1" placeholder="請輸入第一個要修改的字">
    <input type="text" id="s1_ans2" placeholder="請輸入第二個要修改的字">
    <button class="next-btn" onclick="goStep(2)">修復並前進</button>
  </div>

  <div id="step2" class="step">
    <h3>第二關：成語天秤儀</h3>
    <div class="instruction" id="s2-q-text"></div>
    <div id="s2-options"></div>
  </div>

  <div id="step3" class="step">
    <h3>第三關：標點符號定身術</h3>
    <div class="instruction" id="s3-q-text"></div>
    <p>請輸入兩種不同的標點符號改法：</p>
    <input type="text" id="s3_1" placeholder="請輸入改法一">
    <input type="text" id="s3_2" placeholder="請輸入改法二">
    <button class="next-btn" onclick="submitGame()">上傳修復數據</button>
  </div>

  <div id="step4" class="step">
    <h3>📊 文字修復報告</h3>
    <div id="loading" class="loading">📡 正在傳輸數據至 AI 核心...</div>
    <div id="report-box" style="display:none;"></div>
    <button class="next-btn" onclick="location.reload()" style="background:#95a5a6;">重新啟動</button>
  </div>
</div>

<script>
  // --- 題庫資料 ---
  const lib1 = [
    { text: "「假日到公園踢球，我累得滿頭大<span class='hint-highlight'>和</span>，坐在樹蔭下休息時，看著小鳥在枝頭上輕聲<span class='hint-highlight'>哥</span>唱。」" },
    { text: "「這本書的故事內容非常精彩，讓我看得目不轉<span class='hint-highlight'>精</span>，完全<span class='hint-highlight'>忘</span>記了窗外正在下著大雨。」" },
    { text: "「晚餐後，媽媽切了一盤多汁的水<span class='hint-highlight'>莉</span>，那甜美的滋味在舌尖散開，真是一件幸福的事<span class='hint-highlight'>請</span>。」" },
    { text: "「老師教導我們要誠實守信，不可隨便撒<span class='hint-highlight'>惶</span>，這樣才能贏得別人的<span class='hint-highlight'>專</span>重與信任。」" },
    { text: "「今天的作業真不少，我必須專心一<span class='hint-highlight'>至</span>地趕快寫完，才能在晚上準時收看電視節<span class='hint-highlight'>木</span>。」" }
  ];

  const lib2 = [
    { q: "小明在接力賽中雖然落後了，但他依然______，拼命向前衝，最後終於追上了對手。", opts: ["(A) 垂頭喪氣", "(B) 全力以赴", "(C) 走馬看花"], ans: 1 },
    { q: "姐姐的房間總是整理得______，所有的書本和玩具都擺放得整整齊齊。", opts: ["(A) 亂七八糟", "(B) 井然有序", "(C) 五顏六色"], ans: 1 },
    { q: "上課時，我們應該______地聽老師講課，才不會漏掉重要的知識。", opts: ["(A) 聚精會神", "(B) 左右為難", "(C) 興高采烈"], ans: 0 },
    { q: "學習知識不能______，必須每天不斷地累積，才能看到進步。", opts: ["(A) 半途而廢", "(B) 守口如瓶", "(C) 歡天喜地"], ans: 0 },
    { q: "連假期間，動物園裡______，到處都是來參觀的小朋友和家長。", opts: ["(A) 鴉雀無聲", "(B) 守株待兔", "(C) 人山人海"], ans: 2 }
  ];

  const lib3 = ["下雨天留客天留我不留", "行人等不得在此隨地便溺"];

  let studentData = { name: "", s1_text: "", s1_ans1: "", s2_ans2: "", s2_q: "", s2_ans: "", s2_correct: false, s3_text: "" };

  function initGame() {
    studentData.name = document.getElementById('userName').value || "無名工程師";
    
    // 隨機抽題
    const q1 = lib1[Math.floor(Math.random() * lib1.length)];
    const q2 = lib2[Math.floor(Math.random() * lib2.length)];
    const q3 = lib3[Math.floor(Math.random() * lib3.length)];

    studentData.s1_text = q1.text.replace(/<[^>]*>/g, ''); // 純文字存檔
    document.getElementById('s1-display').innerHTML = q1.text;
    
    studentData.s2_q = q2.q;
    document.getElementById('s2-q-text').innerText = "情境：" + q2.q;
    const optContainer = document.getElementById('s2-options');
    q2.opts.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.className = "option-btn";
      btn.innerHTML = o;
      btn.onclick = () => {
        studentData.s2_ans = o;
        studentData.s2_correct = (i === q2.ans);
        goStep(3);
      };
      optContainer.appendChild(btn);
    });

    studentData.s3_text = q3;
    document.getElementById('s3-q-text').innerText = "原文：" + q3;

    goStep(1);
  }

  function goStep(n) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    if(n === 2) {
      studentData.s1_ans1 = document.getElementById('s1_ans1').value;
      studentData.s2_ans2 = document.getElementById('s1_ans2').value;
    }
  }

  function toggleHint() {
    document.querySelectorAll('.hint-highlight').forEach(el => el.classList.toggle('hint-active'));
  }

  function submitGame() {
    goStep(4);
    google.script.run.withSuccessHandler(r => {
      document.getElementById('loading').style.display = 'none';
      const box = document.getElementById('report-box');
      box.innerText = r;
      box.style.display = 'block';
    }).generateAIReport(studentData);
  }
</script>
</body>
</html>
