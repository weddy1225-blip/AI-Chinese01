<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #eef2f7; display: flex; justify-content: center; padding: 20px; }
    .card { background: white; width: 100%; max-width: 580px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
    .step { display: none; }
    .active { display: block; animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .instruction { background: #f8f9fa; border-left: 5px solid #3498db; padding: 12px; margin: 15px 0; font-size: 14px; color: #555; }
    .text-content-wrapper { position: relative; margin-bottom: 10px; }
    .text-content { background:#fff; border: 1px solid #eee; padding:20px; border-radius:8px; line-height: 1.8; font-size: 19px; color: #2c3e50; }
    .hint-small-btn { position: absolute; right: 10px; bottom: 10px; background: none; border: 1px solid #bdc3c7; color: #95a5a6; padding: 2px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }
    input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .next-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    .option-btn { display: block; width: 100%; padding: 15px; margin: 12px 0; background: #fff; border: 2px solid #3498db; border-radius: 10px; cursor: pointer; text-align: left; transition: 0.3s; }
    .option-btn:hover { background: #3498db; color: white; }
    
    .result-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; margin-right: 5px; }
    .correct { background: #d4edda; color: #155724; }
    .wrong { background: #f8d7da; color: #721c24; }
    .answer-key { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 10px; margin-top: 20px; color: #856404; font-size: 14px; }
    .comparison-item { margin-bottom: 12px; padding: 10px; background: rgba(255,255,255,0.6); border-radius: 6px; border: 1px dashed #ccc; }
    .matched-sol { color: #27ae60; font-weight: bold; display: block; margin-top: 5px; font-size: 15px; }
    .highlight-error { color: #e74c3c; font-weight: bold; background: #fdecea; padding: 2px 4px; border-radius: 4px; }
    #report-box { display:none; margin-top:15px; background:#2c3e50; color:#ecf0f1; padding:20px; border-radius:10px; white-space:pre-wrap; font-family: monospace; line-height: 1.5; }
  </style>
</head>
<body>

<div class="card">
  <h1 id="main-title">🛡️ 文字修復大作戰</h1>

  <div id="step0" class="step active">
    <p>工程師你好，請輸入名字以連結系統：</p>
    <input type="text" id="userName" placeholder="輸入名字...">
    <button class="next-btn" onclick="initGame()">啟動系統</button>
  </div>

  <div id="step1" class="step">
    <h3>第一關：字魔捉迷藏</h3>
    <div class="instruction">任務：請輸入這段話中 2 個受感染文字的「正確字」。</div>
    <div class="text-content-wrapper">
      <div id="s1-display" class="text-content"></div>
      <button class="hint-small-btn" id="hintBtn" onclick="showHint()">🔍 提示</button>
    </div>
    <input type="text" id="s1_ans1" placeholder="輸入第一個正確字">
    <input type="text" id="s1_ans2" placeholder="輸入第二個正確字">
    <button class="next-btn" onclick="goStep(2)">修復並前進</button>
  </div>

  <div id="step2" class="step">
    <h3>第二關：成語天秤儀</h3>
    <div class="instruction" id="s2-q-text"></div>
    <div id="s2-options"></div>
  </div>

  <div id="step3" class="step">
    <h3>第三關：標點符號定身術</h3>
    <div class="instruction" id="s3-q-text"></div>
    <p style="font-size: 13px; color: #e67e22;">💡 提示：請輸入兩種不同的斷句方式（系統會自動識別語意）。</p>
    <input type="text" id="s3_1" placeholder="改法一">
    <input type="text" id="s3_2" placeholder="改法二">
    <button class="next-btn" onclick="submitGame()">生成修復報告</button>
  </div>

  <div id="step4" class="step">
    <h3 id="report-title">📊 任務修復掃描報告</h3>
    
    <div id="status-summary" style="margin-bottom: 20px; line-height: 2;"></div>

    <div id="comparison-zone" class="answer-key" style="display:none;">
      <strong>🧾 斷句判答與對應：</strong><hr>
      <div id="s3-details"></div>
    </div>

    <div id="loading" style="text-align:center; padding:10px; font-size:14px; color:#666;">📡 正在連線 AI 核心...</div>
    <div id="report-box"></div>

    <div id="final-answers" class="answer-key" style="background:#e8f4fd; border-color:#d1e9fb; color:#2980b9; display:none;"></div>

    <button class="next-btn" onclick="location.reload()" style="background:#95a5a6;">重新啟動系統</button>
  </div>
</div>

<script>
const lib1 = [
  { text: "這本書的故事內容非長精彩，讓我看得目不轉睛，完全忘記了窗外正在下著大語。", ans: ["長", "語"], correct: ["常", "雨"] },
  { text: "今天的作業真不少，我必須專心一至地趕快寫完，才能在晚上準時收看電視節木。", ans: ["至", "木"], correct: ["志", "目"] },
  { text: "老師教導我們要誠實守信，不可隨便撒惶，這樣才能贏得別人的專重與信任。", ans: ["惶", "專"], correct: ["謊", "尊"] },
  { text: "請你在給他一次機會，別這麽慚忍。", ans: ["在", "慚"], correct: ["再", "殘"] },
  { text: "哪怕在美的風璟，只要錯過，就回不來了。", ans: ["在", "璟"], correct: ["再", "景"] }
];

const lib2 = [
  { q: "這部電影情節緊湊、內容精彩，讓觀眾看得______。", opts: ["(A) 昏昏欲睡", "(B) 津津有味", "(C) 不情不願"], ans: 1, sol: "津津有味" },
  { q: "比賽進入最後關頭，雙方實力相當，情勢變得十分______。", opts: ["(A) 一丘之貉", "(B) 膠著不下", "(C) 風平浪靜"], ans: 1, sol: "膠著不下" },
  { q: "小華準備考試時非常專心，完全沒有受到外界干擾，真是______。", opts: ["(A) 心無旁騖", "(B) 三心二意", "(C) 心不在焉"], ans: 0, sol: "心無旁騖" },
  { q: "看到同學遇到困難，他立刻伸出援手，表現得非常______。", opts: ["(A) 見死不救", "(B) 熱心助人", "(C) 袖手旁觀"], ans: 1, sol: "熱心助人" },
  { q: "他做事總是馬馬虎虎，從不仔細檢查，難怪常常出錯，真是______。", opts: ["(A) 粗心大意", "(B) 小心謹慎", "(C) 一絲不苟"], ans: 0, sol: "粗心大意" },
  { q: "這本小說內容精彩，劇情發展令人難以預料，真是______。", opts: ["(A) 平淡無奇", "(B) 引人入勝", "(C) 枯燥乏味"], ans: 1, sol: "引人入勝" }
];

const lib3 = [
  { 
    q: "下雨天留客天留我不留", 
    solutions: [
      "下雨天留客，天留我不留。", "下雨天留客，天留我？不留。", "下雨天留客，天留我不？留。",
      "下雨，天留客；天留我不留！", "下雨天，留客天，留我？不留。", "下雨天，留客天，留我不？留。",
      "下雨天，留客天，留我不留？"
    ]
  },
  {
    q: "行人等不得在此便溺",
    solutions: ["行人等，不得在此便溺。", "行人，等不得，在此便溺。"]
  }
];

let curQ1, curQ2, curQ3, studentData = {}, hintUsed = false;

function getRandomItem(array) {
  return array[Math.floor(Math.random() * array.length)];
}

function initGame() {
  const nameInput = document.getElementById('userName').value.trim();
  if (!nameInput) { alert("請輸入名字以啟動系統！"); return; }
  studentData.name = nameInput;

  curQ1 = getRandomItem(lib1); 
  curQ2 = getRandomItem(lib2); 
  curQ3 = getRandomItem(lib3);

  document.getElementById('s1-display').innerText = "「" + curQ1.text + "」";
  document.getElementById('s2-q-text').innerText = "情境：" + curQ2.q;
  
  const optBox = document.getElementById('s2-options');
  optBox.innerHTML = "";
  curQ2.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = "option-btn"; b.innerHTML = o;
    b.onclick = () => { studentData.s2_ans = o; studentData.s2_correct = (i === curQ2.ans); goStep(3); };
    optBox.appendChild(b);
  });
  
  document.getElementById('s3-q-text').innerText = "原文：" + curQ3.q;
  goStep(1);
}

function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
}

function showHint() {
  if (hintUsed) return;
  hintUsed = true;
  document.getElementById('hintBtn').style.display = 'none';
  let h = "";
  for (let c of curQ1.text) h += curQ1.ans.includes(c) ? `<span class="highlight-error">${c}</span>` : c;
  document.getElementById('s1-display').innerHTML = "「" + h + "」";
}

function normalize(str) {
  if (!str) return "";
  return str.replace(/[\s]/g, '').replace(/[？\?！\!。；：]/g, '，').replace(/，/g, ',').replace(/,+$/, '');
}

function submitGame() {
  goStep(4);
  document.getElementById('report-title').innerText = `📊 ${studentData.name} 的修復掃描報告`;

  const u1 = document.getElementById('s1_ans1').value.trim();
  const u2 = document.getElementById('s1_ans2').value.trim();
  const s1Correct = [u1, u2].sort().join('') === curQ1.correct.slice().sort().join('');

  const rawAns = [document.getElementById('s3_1').value, document.getElementById('s3_2').value];
  const detailBox = document.getElementById('s3-details');
  detailBox.innerHTML = "";
  let s3MatchCount = 0;

  rawAns.forEach((uRaw, idx) => {
    const uNorm = normalize(uRaw);
    const match = curQ3.solutions.find(sol => normalize(sol) === uNorm);
    const isValid = (uNorm !== "" && match);
    if (isValid) s3MatchCount++;

    const item = document.createElement('div');
    item.className = "comparison-item";
    item.innerHTML = `
      <div><strong>你的寫法 ${idx+1}：</strong> ${uRaw || "（未填）"} <span class="result-badge ${isValid?'correct':'wrong'}">${isValid?'✅ 正確':'❌ 失敗'}</span></div>
      ${isValid ? `<span class="matched-sol">系統匹配答案：${match}</span>` : `<span style="color:#e74c3c; font-size:12px;">(無法匹配到標準斷句，請檢查位置)</span>`}
    `;
    detailBox.appendChild(item);
  });

  const s3Success = (s3MatchCount === 2 && normalize(rawAns[0]) !== normalize(rawAns[1]));

  document.getElementById('status-summary').innerHTML = `
    第一關 字魔挑戰：<span class="result-badge ${s1Correct?'correct':'wrong'}">${s1Correct?'✅ 成功':'❌ 失敗'}</span><br>
    第二關 成語挑戰：<span class="result-badge ${studentData.s2_correct?'correct':'wrong'}">${studentData.s2_correct?'✅ 成功':'❌ 失敗'}</span><br>
    第三關 標點挑戰：<span class="result-badge ${s3Success?'correct':'wrong'}">${s3Success?'✅ 成功':'❌ 失敗'}</span>
  `;

  document.getElementById('final-answers').innerHTML = `
    <strong>📍 正確解答檢閱：</strong><br>
    第一關答案：${curQ1.correct.join('、')}<br>
    第二關答案：${curQ2.sol}
  `;

  document.getElementById('comparison-zone').style.display = 'block';
  document.getElementById('final-answers').style.display = 'block';

  if (typeof google !== 'undefined') {
    google.script.run.withSuccessHandler(r => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('report-box').innerText = r;
      document.getElementById('report-box').style.display = 'block';
    }).generateAIReport({
      name: studentData.name,
      s1_text: curQ1.text,
      s1_ans1: u1,
      s1_ans2: u2,
      s2_q: curQ2.q,
      s2_ans: studentData.s2_ans,
      s2_correct: studentData.s2_correct,
      s3_text: curQ3.q
    });
  } else {
    // 此處已依照您的要求修改
    document.getElementById('loading').innerHTML = "💡 完成掃描";
  }
}
</script>
</body>
</html>
